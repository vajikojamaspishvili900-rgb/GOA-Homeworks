<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="whole">
        <div class="first_half">
            <p class="p1">Your Result</p>
            <div class="circle">
                <p class="_76">76</p>
                <p class="p2">of 100</p>
            </div>
            <div class="txts">
                <p class="great">Great</p>
                <p class="txt">You scored higher than 65% of the people who have taken these tests.</p>
            </div>
        </div>

        <div class="second_half">
            <p class="heading">Summary</p>
            <div class="all">
                <div class="lilboxes">
                    <div class="re"><img src="assets\images\icon-reaction.svg">Reaction</div>
                    <div class="score"><b class="sc">80 </b> / 100</div>
                </div>

                <div class="lilboxes">
                    <div class="me"><img src="assets\images\icon-memory.svg">Memory</div>
                    <div class="score"><b class="sc">92 </b> / 100</div>
                </div>

                <div class="lilboxes">
                    <div class="ve"><img src="assets\images\icon-verbal.svg">Verbal</div>
                    <div class="score"><b class="sc">61 </b> / 100</div>
                </div>

                <div class="lilboxes">
                    <div class="vi"><img src="assets\images\icon-visual.svg">Visual</div>
                    <div class="score"><b class="sc">73 </b> / 100</div>
                </div>  
            </div>
            <button class="continue">Continue</button>
        </div>

    </div>
</body>
</html>
