<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 0) კომენტარებით ჩამოწერეთ დღეს ნასწავლი ყველა მეთოდი და property, გვერდზე მიუწერეთ რას აკეთებს ის
    1) console.log()ში გამოიყენეთ ყველა ნასწავლი მეთოდი სტრინგზე -->

    <script>
        // 0)
        // log() - console-ში ინფორმაციის გამოტანა
        // length - გამოითვლება სტრინგის სიგრძე, ანუ რამდენი სიმბოლოა სულ სტრინგში
        // toUpperCase() - სტრინგის ყველა ასოს გადააქცებს დიდ ასოებად
        // startsWith() - შემოწმდება იწყება თუ არა სტრინგი მოცემული სიმბოლოთი, true ან false-ს გამოიტანს
        // trim() - სტრინგის თავში და ბოლოში წაშლის ცარიელ ადგილებს

        // 1)
        const str = "  Hello World  ";
        console.log(str);
        console.log(str.length);
        console.log(str.toUpperCase());
        console.log(str.startsWith("H"));
        console.log(str.trim());
    </script>

</body>
</html>
