<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <img class="hero-img" src="/day 062/hw/order-summary-component-main/images/illustration-hero.svg">
        <div class="content">
            <h1>Order Summary</h1>
            <p>
                You can now listen to millions of songs,
                audiobooks, and podcasts on any device
                anywhere you like!
            </p>
            <div class="plan-box">
                <div class="plan-left">
                    <img id="icon-music" src="/day 062/hw/order-summary-component-main/images/icon-music.svg" width="45">
                    <div>
                        <h2>Annual Plan</h2>
                        <p class="price">$59.99/year</p>
                    </div>
                </div>
                <a class="change" href="#">Change</a>
            </div>
            <button class="payment-btn">
                Proceed to Payment
            </button>
            <a class="cancel" href="#">
                Cancel Order
            </a>
        </div>
    </div>
</body>
</html>
