<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <div class="bg-card">
            <img src="./images/image-victor.jpg" alt="Victor Crest" class="avatar">
        </div>
        <div class="whole-info">
            <div class="start-info">
                <h1 class="user-name">Victor Crest <span class="light">26</span></h1>
                <p class="light city">London</p>
            </div>
            <hr class="divider">
            <div class="end-info">
                <div class="boxes">
                    <span class="stat-number">80K</span>
                    <span class="details-span">Followers</span>
                </div>
                <div class="boxes">
                    <span class="stat-number">803K</span>
                    <span class="details-span">Likes</span>
                </div>
                <div class="boxes">
                    <span class="stat-number">1.4K</span>
                    <span class="details-span">Photos</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
