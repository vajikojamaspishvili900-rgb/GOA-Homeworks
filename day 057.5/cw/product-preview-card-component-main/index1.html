<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Preview Card</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Montserrat:wght@500;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="card">
        <img class="card__image" src="images/image-product-mobile.jpg" alt="Perfume">

        <div class="card__content">
            <p class="category">PERFUME</p>

            <h1 class="title">Gabrielle Essence Eau De Parfum</h1>

            <p class="description">
                A floral, solar and voluptuous interpretation composed by
                Olivier Polge, Perfumer-Creator for the House of CHANEL.
            </p>

            <div class="price">
                <p class="price__new">$149.99</p>
                <p class="price__old">$169.99</p>
            </div>

            <button class="btn">
                <img src="images/icon-cart.svg" alt="Cart Icon">
                Add to Cart</button>
        </div>
    </div>

</body>

</html>
