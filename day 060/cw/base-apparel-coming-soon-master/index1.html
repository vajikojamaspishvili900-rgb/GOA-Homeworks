<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Base Apparel</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="body">
            <div class="left">
                <div class="cont">
                    <div class="logo">
                        <img src="images/logo.svg" alt="logo">
                    </div>
                    <div class="texts">
                        <div class="headings">
                            <p class="pinkhead">W E'R E</p>
                            <p class="blackhead">C O M I N G S O O N</p>
                        </div>
                        <p class="p_tags">
                            Hello fellow shoppers! We're currently building our
                            new fashion store.
                            Add your email below to stay up-to-date with
                            announcements and our launch deals.
                        </p>
                    </div>
                    <form class="inputs">
                        <input
                            type="email"
                            placeholder="Email Address"
                            required>
                        <button type="submit">
                            <img src="images/icon-arrow.svg" alt="arrow">
                        </button>
                    </form>
                </div>
            </div>
            <div class="right"></div>
        </div>
    </body>
</html>
